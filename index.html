<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>マップ鍛造</title>
  <style>
    :root {
      --ink: #191a17;
      --muted: #6b6e66;
      --paper: #edeae1;
      --panel: #fbfaf4;
      --panel-2: #f1efe6;
      --line: #22241f;
      --accent: #cc4f2f;
      --accent-2: #227166;
      --accent-3: #d59e24;
      --blue: #315f86;
      --shadow: rgba(25, 26, 23, 0.18);
      --tile: 44px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }

    body {
      overflow: hidden;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(34,36,31,0.05) 1px, transparent 1px),
        linear-gradient(0deg,  rgba(34,36,31,0.05) 1px, transparent 1px),
        #d9d5c9;
      background-size: 18px 18px;
      font-family: "Avenir Next","Gill Sans","Trebuchet MS",sans-serif;
    }

    button, input, select, textarea { font: inherit; }

    button {
      min-height: 34px;
      border: 2px solid var(--line);
      color: var(--ink);
      background: var(--panel);
      box-shadow: 3px 3px 0 var(--line);
      cursor: pointer;
      font-weight: 900;
      padding: 6px 10px;
      transition: transform 100ms ease, box-shadow 100ms ease, background 100ms ease;
    }
    button:hover { background: #fff0cd; transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--line); }
    button:active, button.active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--line); background: var(--accent-3); }

    input, select, textarea {
      width: 100%; min-height: 34px;
      border: 2px solid var(--line); border-radius: 0;
      color: var(--ink); background: #fffdf8;
      padding: 6px 8px;
    }
    textarea { min-height: 180px; resize: vertical; font-family: ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-size: 12px; line-height: 1.4; }
    label { display: grid; gap: 5px; color: var(--muted); font-size: 11px; font-weight: 900; text-transform: uppercase; }

    .app { display: grid; grid-template-columns: 372px 1fr 328px; height: 100%; min-height: 0; }
    aside { min-height: 0; overflow: auto; background: rgba(251,250,244,0.96); }
    .left  { border-right: 3px solid var(--line); }
    .right { border-left:  3px solid var(--line); scrollbar-width: none; }
    .inner { padding: 16px; }
    h1 { margin: 0; font-family: Georgia,"Times New Roman",serif; font-size: 31px; line-height: 0.95; }
    .subhead { margin: 5px 0 14px; color: var(--muted); font-size: 12px; font-weight: 800; line-height: 1.35; }
    .section { margin-top: 6px; }
    .section-title { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 10px; font-family: Georgia,"Times New Roman",serif; font-size: 18px; font-weight: 900; }
    .grid-2   { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-top: 10px; }
    .button-row  { display: flex; flex-wrap: wrap; gap: 8px; }
    .primary { color: #fffdf8; background: var(--accent-2); }
    .danger  { color: #fffdf8; background: var(--accent); }
    .tiny { min-height: 29px; padding: 4px 7px; box-shadow: 2px 2px 0 var(--line); font-size: 12px; }
    .tool-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; }
    .tool-grid button { min-width: 0; padding-inline: 2px; font-size: 10px; }

    .palette { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 8px; }
    .tile-pick { display: grid; grid-template-columns: 42px minmax(0,1fr); gap: 7px; align-items: center; min-width: 0; border: 2px solid var(--line); background: #fffdf8; padding: 5px; box-shadow: 2px 2px 0 rgba(34,36,31,0.15); cursor: pointer; }
    .tile-pick.selected { background: #ffe3a3; box-shadow: 3px 3px 0 var(--line); }
    .tile-pick.none .tile-thumb { border-style: dashed; background: linear-gradient(45deg,transparent 45%,rgba(204,79,47,0.7) 46%,rgba(204,79,47,0.7) 54%,transparent 55%), #f8f6ed; }
    .tile-thumb { display: grid; place-items: center; width: 42px; height: 42px; border: 1px solid rgba(34,36,31,0.35); background: #eee9dc; overflow: hidden; font-weight: 900; }
    .tile-thumb img { width: 100%; height: 100%; object-fit: contain; }
    .tile-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--ink); font-size: 12px; font-weight: 900; text-transform: none; }
    .hint { color: var(--muted); font-size: 10px; font-weight: 700; line-height: 1.35; padding-top: 2px; }

    main { min-width: 0; min-height: 0; display: grid; grid-template-rows: auto 1fr; }
    .topbar { display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 12px; align-items: center; border-bottom: 3px solid var(--line); background: rgba(237,234,225,0.95); padding: 10px 12px; }
    .status { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); font-size: 13px; font-weight: 800; }

    .stage { position: relative; min-height: 0; overflow: hidden; background: linear-gradient(135deg,rgba(25,26,23,0.045) 25%,transparent 25%) 0 0 / 22px 22px, linear-gradient(225deg,rgba(25,26,23,0.035) 25%,transparent 25%) 0 0 / 22px 22px, #e8e3d6; }
    canvas { display: block; width: 100%; height: 100%; cursor: crosshair; touch-action: none; }
    canvas.panning { cursor: grabbing; }
    canvas.paste-mode { cursor: copy; }

    .hover-chip { position: absolute; left: 12px; bottom: 12px; z-index: 2; border: 2px solid var(--line); background: rgba(255,253,248,0.94); box-shadow: 3px 3px 0 var(--line); padding: 6px 9px; color: var(--ink); font-size: 12px; font-weight: 900; pointer-events: none; }

    /* paste-mode banner */
    .paste-banner { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 3; border: 2px solid var(--line); background: #ffe3a3; box-shadow: 3px 3px 0 var(--line); padding: 6px 14px; font-size: 13px; font-weight: 900; pointer-events: none; display: none; white-space: nowrap; }
    .paste-banner.visible { display: block; }

    .door-list { display: grid; gap: 8px; }
    .door-row { display: grid; grid-template-columns: auto 1fr auto; gap: 7px; align-items: center; border: 2px solid var(--line); background: #fffdf8; padding: 7px; }
    .door-pos { font-size: 12px; font-weight: 900; }

    .rule-list  { display: grid; gap: 8px; }
    .rule-card  { border: 2px solid var(--line); background: #fffdf8; padding: 8px; box-shadow: 2px 2px 0 rgba(34,36,31,0.16); }
    .rule-head  { display: grid; grid-template-columns: 1fr auto auto; gap: 7px; align-items: center; margin-bottom: 8px; }
    .rule-name  { color: var(--ink); font-size: 12px; font-weight: 900; text-transform: none; }
    .rule-matrix { display: grid; grid-template-columns: repeat(3,1fr); gap: 5px; margin-bottom: 8px; }
    .rule-cell  { min-width: 0; display: grid; gap: 4px; }
    .rule-cell span { color: var(--muted); font-size: 9px; font-weight: 900; }
    .rule-cell select { min-height: 30px; padding: 3px; font-size: 11px; }

    .modal { position: fixed; inset: 0; z-index: 20; display: none; background: rgba(25,26,23,0.42); }
    .modal.open { display: grid; place-items: center; }
    .modal-panel { width: min(980px,calc(100vw - 28px)); max-height: calc(100vh - 28px); display: grid; grid-template-rows: auto minmax(0,1fr); border: 3px solid var(--line); background: var(--panel); box-shadow: 8px 8px 0 var(--line); }
    .modal-head { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center; border-bottom: 3px solid var(--line); padding: 10px 12px; }
    .modal-title { font-family: Georgia,"Times New Roman",serif; font-size: 21px; font-weight: 900; }
    .modal-body { min-height: 0; overflow: auto; padding: 12px; }
    .readout-grid { display: grid; grid-template-columns: repeat(var(--cols),24px); gap: 2px; width: max-content; }
    .readout-cell { display: grid; place-items: center; width: 24px; height: 22px; border: 1px solid rgba(34,36,31,0.28); color: #fffdf8; background: var(--blue); font-size: 11px; font-weight: 900; }
    .readout-cell.none { color: var(--muted); background: #fffdf8; border-style: dashed; }

    @media (max-width: 1120px) {
      body { overflow: auto; }
      .app { grid-template-columns: 1fr; height: auto; min-height: 100%; }
      .left, .right { border: 0; border-bottom: 3px solid var(--line); }
      main { min-height: 76vh; }
    }
    @media (max-width: 560px) {
      .inner { padding: 14px; }
      .grid-2, .button-grid, .palette { grid-template-columns: 1fr; }
      .tool-grid { grid-template-columns: repeat(2,1fr); }
      .topbar { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app">
  <aside class="left">
    <div class="inner">
      <section class="section">
        <div class="grid-2">
          <label>サイズ   <input id="sizeInput" type="number" min="3" step="1" value="18"></label>
          <label>下部カット <input id="cutInput"  type="number" min="0" step="1" value="18"></label>
          <label>ID       <input id="idInput"   type="text" value="1"></label>
          <label>タイプ    <input id="typeInput" type="text" value="N"></label>
        </div>
        <div class="button-grid">
          <button class="primary" id="generateBtn">NxN 生成</button>
          <button id="fitBtn">ビューに合わせる</button>
        </div>
      </section>

      <section class="section">
        <div class="tool-grid" id="toolGrid">
          <button data-tool="paint"   class="active" title="クリックホールドで選択タイルを描画">ペイント</button>
          <button data-tool="erase"   title="なし（-2）を描画">消去</button>
          <button data-tool="replace" title="ドラッグしたソースタイルを選択タイルに置換">置換</button>
          <button data-tool="fill"    title="連続した一致タイルをフラッドフィル">塗りつぶし</button>
          <button data-tool="rect"    title="矩形をドラッグ">矩形</button>
          <button data-tool="line"    title="直線をドラッグ">直線</button>
          <button data-tool="pick"    title="カーソル下のタイルを選択">ピック</button>
          <button data-tool="door"    title="タイルをクリックしてポイントを切替">ポイント</button>
          <button data-tool="select"  title="矩形選択 — Ctrl+C でコピー、Ctrl+V で貼り付け">選択</button>
        </div>
        <div class="button-grid">
          <button id="undoBtn">元に戻す</button>
          <button id="redoBtn">やり直す</button>
          <button id="copyBtn" class="tiny" title="選択範囲をコピー (Ctrl+C)">コピー</button>
          <button id="pasteBtn" class="tiny" title="貼り付けモード (Ctrl+V)">貼り付け</button>
        </div>
        <p class="hint">中ボタンまたはスペース＋ドラッグでパン。ホイールでズーム。<br>選択ツール → Ctrl+C でコピー → Ctrl+V で貼り付けモード → クリックで配置、Esc でキャンセル。</p>
      </section>

      <section class="section">
        <div class="palette" id="palette"></div>
      </section>
    </div>
  </aside>

  <main>
    <div class="topbar">
      <div class="status" id="status">準備完了。</div>
      <div class="button-row">
        <button class="tiny" id="zoomOutBtn">-</button>
        <button class="tiny" id="zoomInBtn">+</button>
        <button class="tiny" id="readoutBtn">グリッド</button>
        <button class="tiny" id="importBtn">JSON インポート</button>
        <button class="tiny primary" id="exportBtn">JSON エクスポート</button>
      </div>
    </div>
    <div class="stage" id="stage">
      <canvas id="canvas"></canvas>
      <div class="hover-chip" id="hoverChip">タイルなし</div>
      <div class="paste-banner" id="pasteBanner">📋 貼り付けモード — クリックで配置、Esc でキャンセル</div>
    </div>
  </main>

  <aside class="right">
    <div class="inner">
      <section>
        <div class="section-title">ポイント</div>
        <label>新しいポイントタグ <input id="doorTagInput" type="text" value="point"></label>
        <div class="button-grid">
          <button id="clearDoorsBtn">ポイントクリア</button>
          <button id="exportCopyBtn">JSON をコピー</button>
        </div>
        <div class="section">
          <div class="door-list" id="doorList"></div>
        </div>
      </section>

      <section class="section">
        <div class="section-title">
          ルール
          <span class="button-row">
            <button class="tiny" id="importRulesBtn">インポート</button>
            <button class="tiny" id="exportRulesBtn">エクスポート</button>
            <button class="tiny primary" id="addRuleBtn">追加</button>
          </span>
        </div>
        <p class="hint">ルールは編集のたびに実行されます。3x3の近傍をソースマップで照合し、レンダリングマップの中心タイルに出力を書き込みます。</p>
        <div class="rule-list" id="ruleList"></div>
      </section>
    </div>
  </aside>
</div>

<div class="modal" id="readoutModal" aria-hidden="true">
  <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="readoutTitle">
    <div class="modal-head">
      <div class="modal-title" id="readoutTitle">最終マップグリッド</div>
      <button id="closeReadoutBtn">閉じる</button>
    </div>
    <div class="modal-body">
      <div class="readout-grid" id="readoutGrid"></div>
    </div>
  </div>
</div>

<input id="importInput"      type="file" accept="application/json,.json" hidden>
<input id="importRulesInput" type="file" accept="application/json,.json" hidden>

<script>
const tiles = [
  { id:0, name:"Floor"         },
  { id:1, name:"Left"          },
  { id:2, name:"Right"         },
  { id:3, name:"Diagonal"      },
  { id:4, name:"Corner"        },
  { id:5, name:"Square Pillar" },
  { id:6, name:"Triangle Pillar"},
  { id:7, name:"Edge"          },
  { id:8, name:"Left Edge"     },
  { id:9, name:"Right Edge"    }
];

const tileOptions = [{ id:-2, name:"None" }, ...tiles];
const ruleCells   = ["TL","TC","TR","CL","CC","CR","BL","BC","BR"];
const storageKey  = "ultimate-map-forge-v1";
const imageCache  = new Map();

const state = {
  sourceMap: [], finalMap: [], doors: [], rules: [],
  selectedTile: 0, tool: "paint",
  zoom: 1, panX: 0, panY: 0,
  hover: null, pointer: null, preview: null,
  spaceDown: false, history: [], future: [],
  lastReplacementSource: null,
  // copy-paste
  selections: null,  // array of { x1,y1,x2,y2 } grid coords (inclusive)
  clipboard: null,   // { cells: [{x,y,id}], w, h }  relative positions
  pasteMode: false,  // true while waiting for click-to-stamp
  // dirty-draw throttle
  rafPending: false,
  lastHoverKey: ""
};

const els = {
  size:             document.querySelector("#sizeInput"),
  cut:              document.querySelector("#cutInput"),
  id:               document.querySelector("#idInput"),
  type:             document.querySelector("#typeInput"),
  generate:         document.querySelector("#generateBtn"),
  fit:              document.querySelector("#fitBtn"),
  zoomIn:           document.querySelector("#zoomInBtn"),
  zoomOut:          document.querySelector("#zoomOutBtn"),
  import:           document.querySelector("#importBtn"),
  importInput:      document.querySelector("#importInput"),
  export:           document.querySelector("#exportBtn"),
  exportCopy:       document.querySelector("#exportCopyBtn"),
  undo:             document.querySelector("#undoBtn"),
  redo:             document.querySelector("#redoBtn"),
  copyBtn:          document.querySelector("#copyBtn"),
  pasteBtn:         document.querySelector("#pasteBtn"),
  palette:          document.querySelector("#palette"),
  toolGrid:         document.querySelector("#toolGrid"),
  stage:            document.querySelector("#stage"),
  canvas:           document.querySelector("#canvas"),
  hoverChip:        document.querySelector("#hoverChip"),
  pasteBanner:      document.querySelector("#pasteBanner"),
  status:           document.querySelector("#status"),
  doorTag:          document.querySelector("#doorTagInput"),
  doorList:         document.querySelector("#doorList"),
  clearDoors:       document.querySelector("#clearDoorsBtn"),
  addRule:          document.querySelector("#addRuleBtn"),
  importRules:      document.querySelector("#importRulesBtn"),
  importRulesInput: document.querySelector("#importRulesInput"),
  exportRules:      document.querySelector("#exportRulesBtn"),
  ruleList:         document.querySelector("#ruleList"),
  readout:          document.querySelector("#readoutBtn"),
  readoutModal:     document.querySelector("#readoutModal"),
  closeReadout:     document.querySelector("#closeReadoutBtn"),
  readoutGrid:      document.querySelector("#readoutGrid")
};

const ctx = els.canvas.getContext("2d");

// ─── Helpers ───────────────────────────────────────────────────────────────

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function readSize() {
  const size = Math.max(3, parseInt(els.size.value,10) || 18);
  const parsedCut = parseInt(els.cut.value,10);
  const cut = Math.max(0, Number.isInteger(parsedCut) ? parsedCut : size);
  els.size.value = size; els.cut.value = cut;
  return { size, cut };
}

function cloneMap(map)   { return map.map(r => r.slice()); }
function cloneDoors(doors){ return doors.map(d => ({ position:{...d.position}, tag:d.tag })); }

function snapshot() { return { sourceMap: cloneMap(state.sourceMap), doors: cloneDoors(state.doors) }; }
function restore(snap) { state.sourceMap = cloneMap(snap.sourceMap); state.doors = cloneDoors(snap.doors); applyRulesAndRender(); }

function pushHistory() {
  if (!state.sourceMap.length) return;
  state.history.push(snapshot());
  if (state.history.length > 80) state.history.shift();
  state.future = [];
}

// ─── Persistence ───────────────────────────────────────────────────────────

function saveLocal() {
  const payload = {
    size: els.size.value, cut: els.cut.value,
    id: els.id.value, type: els.type.value,
    doorTag: els.doorTag.value,
    selectedTile: state.selectedTile, tool: state.tool,
    sourceMap: state.sourceMap, doors: state.doors, rules: state.rules
  };
  localStorage.setItem(storageKey, JSON.stringify(payload));
}

function loadLocal() {
  try {
    const saved = JSON.parse(localStorage.getItem(storageKey) || "{}");
    if (saved.size)  els.size.value = saved.size;
    if (saved.cut  !== undefined) els.cut.value = saved.cut;
    if (saved.id)   els.id.value   = saved.id;
    if (saved.type) els.type.value = saved.type;
    if (saved.doorTag) els.doorTag.value = saved.doorTag;
    if (Number.isInteger(saved.selectedTile)) state.selectedTile = saved.selectedTile;
    if (saved.tool) state.tool = saved.tool;
    if (Array.isArray(saved.sourceMap) && saved.sourceMap.length) state.sourceMap = saved.sourceMap;
    if (Array.isArray(saved.doors)) state.doors = saved.doors;
    if (Array.isArray(saved.rules)) state.rules = saved.rules.map(normalizeRule);
  } catch { localStorage.removeItem(storageKey); }
}

// ─── Map generation ────────────────────────────────────────────────────────

function makeDefaultMap() {
  const { size, cut } = readSize();
  const threshold = (size - 1) * 2 - cut;
  return Array.from({ length: size }, (_, y) =>
    Array.from({ length: size }, (_, x) => (x + y > threshold ? -2 : 0))
  );
}

function generate() {
  pushHistory();
  state.sourceMap = makeDefaultMap();
  state.doors = state.doors.filter(d => tileAt(state.sourceMap, d.position.x, d.position.y) !== undefined);
  state.selections = null;
  applyRulesAndRender();
  fitView();
}

// ─── Tile access ───────────────────────────────────────────────────────────

function tileAt(map, x, y) {
  if (y < 0 || y >= map.length || x < 0 || x >= map[0].length) return undefined;
  return map[y][x];
}
function setTile(map, x, y, value) {
  if (y < 0 || y >= map.length || x < 0 || x >= map[0].length) return false;
  if (map[y][x] === value) return false;
  map[y][x] = value; return true;
}

// ─── Rules ─────────────────────────────────────────────────────────────────

function normalizeRule(rule = {}) {
  return {
    name: rule.name || "Rule",
    enabled: rule.enabled !== false,
    match: Array.from({ length: 9 }, (_, i) => {
      const v = parseInt(rule.match?.[i], 10);
      return Number.isInteger(v) && v >= -3 && v <= 9 ? v : -3;
    }),
    output: Number.isInteger(parseInt(rule.output,10)) ? clamp(parseInt(rule.output,10),-2,9) : 0
  };
}

function matchesRule(map, x, y, rule) {
  for (let i = 0; i < 9; i++) {
    const expected = rule.match[i];
    if (expected === -3) continue;
    const dx = (i % 3) - 1, dy = Math.floor(i / 3) - 1;
    const actual = tileAt(map, x + dx, y + dy);
    if (expected === -2) { if (actual !== -2 && actual !== undefined) return false; }
    else if (actual !== expected) return false;
  }
  return true;
}

function applyRules() {
  let next = cloneMap(state.sourceMap);
  for (const rawRule of state.rules) {
    const rule = normalizeRule(rawRule);
    if (!rule.enabled) continue;
    const pass = cloneMap(next);
    for (let y = 0; y < next.length; y++)
      for (let x = 0; x < next[y].length; x++)
        if (matchesRule(next, x, y, rule)) pass[y][x] = rule.output;
    next = pass;
  }
  state.finalMap = next;
}

function applyRulesAndRender() {
  applyRules();
  saveLocal();
  renderDoors(); renderRules(); renderReadout(); updateStatus();
  scheduleDraw();
}

function updateStatus() {
  if (!state.finalMap.length) { els.status.textContent = "No map."; return; }
  const count = state.finalMap.flat().filter(id => id !== -2).length;
  const compressed = compressForExport();
  let selInfo = "";
  if (state.selections && state.selections.length) {
    const bounds = getSelectionCells();
    if (bounds) selInfo = ` | 選択: ${bounds.w}x${bounds.h} (${bounds.cells.length} tiles)`;
  }
  const clipInfo = state.clipboard ? ` | クリップボード: ${state.clipboard.w}x${state.clipboard.h}` : "";
  els.status.textContent = `${state.finalMap[0].length}x${state.finalMap.length} source, ${compressed.size.x}x${compressed.size.y} export, ${count} visible tiles, ${state.doors.length} doors${selInfo}${clipInfo}.`;
}

function tileLabel(id) {
  if (id === -2) return "-2 None";
  const t = tiles.find(t => t.id === id);
  return t ? `${t.id} ${t.name}` : String(id);
}

// ─── Image preload ─────────────────────────────────────────────────────────

function preloadImages() {
  return Promise.all(tiles.map(tile => new Promise(resolve => {
    const img = new Image();
    img.onload = () => { imageCache.set(tile.id, img); resolve(); };
    img.onerror = resolve;
    img.src = `assets/${tile.id}.png`;
  })));
}

// ─── Palette ───────────────────────────────────────────────────────────────

function renderPalette() {
  els.palette.innerHTML = "";
  for (const tile of tileOptions) {
    const item = document.createElement("button");
    item.className = `tile-pick${tile.id === -2 ? " none":""}${state.selectedTile === tile.id ? " selected":""}`;
    item.type = "button";
    item.title = tile.id === -2 ? "None / delete tile" : tileLabel(tile.id);
    item.addEventListener("click", () => selectTile(tile.id));
    const thumb = document.createElement("span"); thumb.className = "tile-thumb";
    if (tile.id === -2) { thumb.textContent = "-2"; }
    else { const img = document.createElement("img"); img.src = `assets/${tile.id}.png`; img.alt = tileLabel(tile.id); thumb.appendChild(img); }
    const name = document.createElement("span"); name.className = "tile-name"; name.textContent = tileLabel(tile.id);
    item.append(thumb, name);
    els.palette.appendChild(item);
  }
}

function selectTile(id) { state.selectedTile = id; renderPalette(); saveLocal(); }
function isTypingTarget(t) { return ["INPUT","SELECT","TEXTAREA"].includes(t?.tagName) || t?.isContentEditable; }

function selectTool(tool) {
  // leaving paste mode if switching tools
  if (tool !== state.tool && state.pasteMode) exitPasteMode();
  state.tool = tool;
  els.toolGrid.querySelectorAll("button").forEach(b => b.classList.toggle("active", b.dataset.tool === tool));
  saveLocal();
  scheduleDraw();
}

// ─── Canvas / view ─────────────────────────────────────────────────────────

function resizeCanvas(drawNow = true) {
  const rect = els.stage.getBoundingClientRect();
  const dpr  = window.devicePixelRatio || 1;
  els.canvas.width  = Math.max(1, Math.floor(rect.width  * dpr));
  els.canvas.height = Math.max(1, Math.floor(rect.height * dpr));
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (drawNow) draw();
}

function tileW() { return parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--tile")) || 44; }

function gridToWorld(x, y) {
  const tw = tileW();
  return { x: (x - y) * tw * 0.5, y: (x + y) * tw * 0.285 };
}

function worldToGrid(wx, wy) {
  const tw = tileW(), stepX = tw * 0.5, stepY = tw * 0.285;
  const gx = (wy / stepY + wx / stepX) / 2;
  const gy = (wy / stepY - wx / stepX) / 2;
  return { x: Math.round(gx), y: Math.round(gy) };
}

function eventToGrid(event) {
  const rect = els.canvas.getBoundingClientRect();
  const sx = (event.clientX - rect.left  - state.panX) / state.zoom;
  const sy = (event.clientY - rect.top   - state.panY) / state.zoom;
  const tw = tileW();
  const grid = worldToGrid(sx, sy - tw * 0.75);
  if (!state.sourceMap.length) return null;
  if (grid.y < 0 || grid.y >= state.sourceMap.length || grid.x < 0 || grid.x >= state.sourceMap[0].length) return null;
  return grid;
}

function mapBounds() {
  if (!state.sourceMap.length) return { minX:0,minY:0,maxX:1,maxY:1 };
  const tw = tileW(), tileH = tw;
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  for (let y = 0; y < state.sourceMap.length; y++)
    for (let x = 0; x < state.sourceMap[y].length; x++) {
      const p = gridToWorld(x, y);
      minX = Math.min(minX, p.x - tw/2); minY = Math.min(minY, p.y);
      maxX = Math.max(maxX, p.x + tw/2); maxY = Math.max(maxY, p.y + tileH);
    }
  return { minX: minX-tw, minY: minY-tw*0.4, maxX: maxX+tw, maxY: maxY+tw };
}

function fitView() {
  if (!state.sourceMap.length) return;
  resizeCanvas(false);
  const rect = els.stage.getBoundingClientRect();
  const b = mapBounds();
  const w = b.maxX - b.minX, h = b.maxY - b.minY;
  state.zoom = clamp(Math.min((rect.width-42)/w, (rect.height-42)/h), 0.08, 3);
  state.panX  = (rect.width  - w * state.zoom) / 2 - b.minX * state.zoom;
  state.panY  = (rect.height - h * state.zoom) / 2 - b.minY * state.zoom;
  draw();
}

function zoomAt(factor, cx=null, cy=null) {
  const rect = els.canvas.getBoundingClientRect();
  const x = cx ?? rect.width/2, y = cy ?? rect.height/2;
  const bx = (x - state.panX) / state.zoom, by = (y - state.panY) / state.zoom;
  state.zoom = clamp(state.zoom * factor, 0.06, 5);
  state.panX = x - bx * state.zoom; state.panY = y - by * state.zoom;
  draw();
}

// ─── Scheduled draw (rAF throttle) ─────────────────────────────────────────

function scheduleDraw() {
  if (state.rafPending) return;
  state.rafPending = true;
  requestAnimationFrame(() => { state.rafPending = false; draw(); });
}

// ─── Drawing ───────────────────────────────────────────────────────────────

function noneGuideYOffset(tw) { return tw * 0.42; }

function drawIsoFootprint(x, y, stroke="rgba(34,36,31,0.2)", fill=null, lineWidth=1, dashed=true, yOffset=0) {
  const tw = tileW(), stepY = tw * 0.285;
  const p = gridToWorld(x, y), py = p.y + yOffset;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(p.x, py);
  ctx.lineTo(p.x + tw/2, py + stepY);
  ctx.lineTo(p.x, py + stepY * 2);
  ctx.lineTo(p.x - tw/2, py + stepY);
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  ctx.strokeStyle = stroke; ctx.lineWidth = lineWidth;
  if (dashed) ctx.setLineDash([3.5, 4.5]);
  ctx.stroke();
  ctx.restore();
}

function drawTileOverlay(x, y, color="#cc4f2f", mode="hover") {
  const tw = tileW(), id = tileAt(state.finalMap, x, y);
  const p  = gridToWorld(x, y), img = imageCache.get(id);
  if (id === -2 || !img) {
    drawIsoFootprint(x, y, color,
      mode==="hover" ? "rgba(255,227,126,0.18)" : "rgba(204,79,47,0.12)",
      mode==="hover" ? 2.5 : 2, id===-2, id===-2 ? noneGuideYOffset(tw) : 0);
    return;
  }
  ctx.save();
  ctx.shadowColor = color; ctx.shadowBlur = mode==="hover" ? 16 : 10;
  ctx.filter = mode==="hover" ? "brightness(1.28) saturate(1.18)" : "brightness(1.14) saturate(1.1)";
  ctx.globalAlpha = mode==="hover" ? 0.88 : 0.58;
  ctx.drawImage(img, p.x - tw/2, p.y, tw, tw);
  ctx.restore();
  ctx.save();
  ctx.lineWidth = mode==="hover" ? 2.5 : 2;
  ctx.strokeStyle = color; ctx.globalAlpha = mode==="hover" ? 0.95 : 0.65;
  ctx.strokeRect(p.x - tw/2 + 1.5, p.y + 1.5, tw - 3, tw - 3);
  ctx.restore();
}

function drawRuleChangeMark(x, y) {
  const tw = tileW(), p = gridToWorld(x, y);
  ctx.save();
  ctx.fillStyle = "rgba(213,158,36,0.9)"; ctx.strokeStyle = "#22241f"; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(p.x + tw*0.28, p.y + tw*0.1); ctx.lineTo(p.x + tw*0.44, p.y + tw*0.1);
  ctx.lineTo(p.x + tw*0.44, p.y + tw*0.26); ctx.lineTo(p.x + tw*0.28, p.y + tw*0.26);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.restore();
}

// Draw selection rectangle in iso space
function drawSelection() {
  if (!state.selections) return;
  const tw = tileW();
  for (const sel of state.selections) {
    const x1 = Math.min(sel.x1, sel.x2), y1 = Math.min(sel.y1, sel.y2);
    const x2 = Math.max(sel.x1, sel.x2), y2 = Math.max(sel.y1, sel.y2);
    for (let cy = y1; cy <= y2; cy++)
      for (let cx = x1; cx <= x2; cx++) {
        if (tileAt(state.sourceMap, cx, cy) === undefined) continue;
        drawIsoFootprint(cx, cy, "#315f86", "rgba(49,95,134,0.10)", 2, false, noneGuideYOffset(tw));
      }
  }
}

// Draw clipboard preview at hover (paste mode)
function drawPastePreview() {
  if (!state.pasteMode || !state.clipboard || !state.hover) return;
  const { cells } = state.clipboard;
  for (const { x: ox, y: oy, id } of cells) {
    const tx = state.hover.x + ox, ty = state.hover.y + oy;
    if (tileAt(state.sourceMap, tx, ty) === undefined) continue;
    const tw = tileW(), p = gridToWorld(tx, ty);
    const img = imageCache.get(id);
    if (id === -2 || !img) {
      drawIsoFootprint(tx, ty, "#227166", "rgba(34,113,102,0.14)", 2, false, noneGuideYOffset(tw));
    } else {
      ctx.save();
      ctx.globalAlpha = 0.62;
      ctx.filter = "brightness(1.2) saturate(1.1)";
      ctx.drawImage(img, p.x - tw/2, p.y, tw, tw);
      ctx.restore();
      ctx.save();
      ctx.lineWidth = 2; ctx.strokeStyle = "#227166"; ctx.globalAlpha = 0.85;
      ctx.strokeRect(p.x - tw/2 + 1.5, p.y + 1.5, tw - 3, tw - 3);
      ctx.restore();
    }
  }
}

function draw() {
  const rect = els.stage.getBoundingClientRect();
  ctx.clearRect(0, 0, rect.width, rect.height);
  if (!state.finalMap.length) return;
  const tw = tileW();

  ctx.save();
  ctx.translate(state.panX, state.panY);
  ctx.scale(state.zoom, state.zoom);

  // tiles
  for (let y = 0; y < state.finalMap.length; y++) {
    for (let x = 0; x < state.finalMap[y].length; x++) {
      const id = state.finalMap[y][x], p = gridToWorld(x, y);
      if (id === -2) { drawIsoFootprint(x, y, "rgba(34,36,31,0.2)", null, 1, true, noneGuideYOffset(tw)); continue; }
      const img = imageCache.get(id);
      if (img) ctx.drawImage(img, p.x - tw/2, p.y, tw, tw);
      else { ctx.fillStyle = "#315f86"; ctx.fillRect(p.x - tw/2, p.y, tw, tw); }
      if (state.sourceMap[y][x] !== id) drawRuleChangeMark(x, y);
    }
  }

  // rect/line preview
  if (state.preview) for (const c of state.preview.cells) drawTileOverlay(c.x, c.y, "#cc4f2f","preview");

  // hover overlay (skip in paste mode — paste preview handles it)
  if (state.hover && !state.pasteMode) drawTileOverlay(state.hover.x, state.hover.y, "#cc4f2f","hover");

  // selection highlight
  drawSelection();

  // paste preview
  drawPastePreview();

  // doors
  for (const door of state.doors) {
    const p = gridToWorld(door.position.x, door.position.y);
    ctx.fillStyle = "#cc4f2f"; ctx.strokeStyle = "#22241f"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(p.x, p.y + tw*0.55, tw*0.16, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  }

  ctx.restore();
}

// ─── Geometry helpers ──────────────────────────────────────────────────────

function cellsInRect(a, b) {
  const cells = [];
  for (let y = Math.min(a.y,b.y); y <= Math.max(a.y,b.y); y++)
    for (let x = Math.min(a.x,b.x); x <= Math.max(a.x,b.x); x++)
      if (tileAt(state.sourceMap, x, y) !== undefined) cells.push({x,y});
  return cells;
}

function cellsInLine(a, b) {
  const cells = [], dx=Math.abs(b.x-a.x), dy=Math.abs(b.y-a.y);
  const sx = a.x<b.x?1:-1, sy = a.y<b.y?1:-1;
  let err = dx-dy, x = a.x, y = a.y;
  while (true) {
    if (tileAt(state.sourceMap,x,y) !== undefined) cells.push({x,y});
    if (x===b.x && y===b.y) break;
    const e2=err*2;
    if (e2>-dy) { err-=dy; x+=sx; }
    if (e2< dx) { err+=dx; y+=sy; }
  }
  return cells;
}

function floodCells(start) {
  const target = tileAt(state.sourceMap, start.x, start.y);
  if (target === undefined) return [];
  const seen=new Set(), queue=[start], cells=[];
  while (queue.length) {
    const c = queue.shift(), key=`${c.x},${c.y}`;
    if (seen.has(key)) continue; seen.add(key);
    if (tileAt(state.sourceMap,c.x,c.y) !== target) continue;
    cells.push(c);
    queue.push({x:c.x+1,y:c.y},{x:c.x-1,y:c.y},{x:c.x,y:c.y+1},{x:c.x,y:c.y-1});
  }
  return cells;
}

// ─── Paint / edit ──────────────────────────────────────────────────────────

function paintCells(cells, value) {
  let changed = false;
  for (const c of cells) changed = setTile(state.sourceMap, c.x, c.y, value) || changed;
  if (changed) applyRulesAndRender();
  return changed;
}

function replaceTileAt(cell) {
  const source = state.lastReplacementSource ?? tileAt(state.sourceMap, cell.x, cell.y);
  state.lastReplacementSource = source;
  if (source === state.selectedTile) return false;
  const cells = [];
  for (let y = 0; y < state.sourceMap.length; y++)
    for (let x = 0; x < state.sourceMap[y].length; x++)
      if (state.sourceMap[y][x] === source) cells.push({x,y});
  return paintCells(cells, state.selectedTile);
}

function toggleDoor(cell) {
  const i = state.doors.findIndex(d => d.position.x===cell.x && d.position.y===cell.y);
  if (i>=0) state.doors.splice(i,1);
  else state.doors.push({ position:{x:cell.x,y:cell.y}, tag: els.doorTag.value.trim()||"door" });
  applyRulesAndRender();
}

// ─── Copy / Paste ──────────────────────────────────────────────────────────

function getSelectionCells() {
  if (!state.selections || !state.selections.length) return null;
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  const cellsMap = new Map();
  for (const sel of state.selections) {
    const x1 = Math.min(sel.x1, sel.x2), y1 = Math.min(sel.y1, sel.y2);
    const x2 = Math.max(sel.x1, sel.x2), y2 = Math.max(sel.y1, sel.y2);
    for (let y = y1; y <= y2; y++) {
      for (let x = x1; x <= x2; x++) {
        if (tileAt(state.sourceMap, x, y) !== undefined) {
          minX = Math.min(minX, x); minY = Math.min(minY, y);
          maxX = Math.max(maxX, x); maxY = Math.max(maxY, y);
          cellsMap.set(`${x},${y}`, {x, y});
        }
      }
    }
  }
  if (minX === Infinity) return null;
  return { minX, minY, maxX, maxY, w: maxX-minX+1, h: maxY-minY+1, cells: Array.from(cellsMap.values()) };
}

function copySelection() {
  const bounds = getSelectionCells(); if (!bounds) { els.status.textContent = "コピーする選択範囲がありません。選択ツールで範囲を選択してください。"; return; }
  const cells = [];
  for (const c of bounds.cells) {
    const id = tileAt(state.sourceMap, c.x, c.y);
    if (id !== undefined) cells.push({ x: c.x - bounds.minX, y: c.y - bounds.minY, id });
  }
  state.clipboard = { cells, w: bounds.w, h: bounds.h };
  updateStatus();
  els.status.textContent = `コピー済: ${bounds.w}x${bounds.h} の範囲 (${cells.length} タイル)。Ctrl+V で貼り付け。`;
}

function enterPasteMode() {
  if (!state.clipboard) { els.status.textContent = "クリップボードが空です。先に選択してコピーしてください。"; return; }
  state.pasteMode = true;
  els.pasteBanner.classList.add("visible");
  els.canvas.classList.add("paste-mode");
  els.status.textContent = "貼り付けモード — マップ上でクリックして配置、Esc でキャンセル。";
  scheduleDraw();
}

function exitPasteMode() {
  state.pasteMode = false;
  els.pasteBanner.classList.remove("visible");
  els.canvas.classList.remove("paste-mode");
  scheduleDraw();
}

function stampPaste(cell) {
  if (!state.clipboard || !cell) return;
  pushHistory();
  let changed = false;
  for (const { x: ox, y: oy, id } of state.clipboard.cells)
    changed = setTile(state.sourceMap, cell.x+ox, cell.y+oy, id) || changed;
  if (changed) applyRulesAndRender();
  else state.history.pop();
}

// ─── Pointer handling ──────────────────────────────────────────────────────

function startPointer(event) {
  const cell = eventToGrid(event);
  const wantsPan = event.button === 1 || state.spaceDown;

  // paste-mode: click stamps regardless of pan intent
  if (state.pasteMode && !wantsPan && cell) {
    stampPaste(cell);
    exitPasteMode();
    return;
  }

  const isSelectShortcut = event.ctrlKey || event.metaKey;
  const currentTool = isSelectShortcut && !wantsPan ? "select" : state.tool;

  state.pointer = {
    id: event.pointerId, mode: wantsPan ? "pan" : "edit",
    startClientX: event.clientX, startClientY: event.clientY,
    startPanX: state.panX, startPanY: state.panY,
    startCell: cell, lastKey: "", changed: false,
    tool: currentTool, activeSelection: null
  };
  els.canvas.setPointerCapture(event.pointerId);

  if (wantsPan) { els.canvas.classList.add("panning"); return; }
  if (!cell) return;

  if (currentTool === "select") {
    const newSel = { x1:cell.x, y1:cell.y, x2:cell.x, y2:cell.y };
    if (isSelectShortcut) {
      if (!state.selections) state.selections = [];
      state.selections.push(newSel);
    } else {
      state.selections = [newSel];
    }
    state.pointer.activeSelection = newSel;
    scheduleDraw(); return;
  }

  pushHistory();
  state.lastReplacementSource = null;
  if (currentTool==="paint")   state.pointer.changed = paintCells([cell], state.selectedTile);
  if (currentTool==="erase")   state.pointer.changed = paintCells([cell], -2);
  if (currentTool==="replace") state.pointer.changed = replaceTileAt(cell);
  if (currentTool==="fill")    state.pointer.changed = paintCells(floodCells(cell), state.selectedTile);
  if (currentTool==="pick")    { state.selectedTile = tileAt(state.sourceMap,cell.x,cell.y); renderPalette(); }
  if (currentTool==="door")    { toggleDoor(cell); state.pointer.changed = true; }
  updatePreview(cell);
}

function movePointer(event) {
  const cell = eventToGrid(event);

  // ── Dirty check: skip redraw if nothing changed ──────────────────────────
  const newKey = cell ? `${cell.x},${cell.y}` : "";
  const hoverChanged = newKey !== state.lastHoverKey;
  state.lastHoverKey = newKey;
  state.hover = cell;

  // Update chip text whenever cell changes
  if (hoverChanged) {
    if (cell) {
      els.hoverChip.textContent = `x ${cell.x}, y ${cell.y} | source ${tileLabel(tileAt(state.sourceMap,cell.x,cell.y))} | final ${tileLabel(tileAt(state.finalMap,cell.x,cell.y))}`;
    } else {
      els.hoverChip.textContent = "タイルなし";
    }
  }

  if (!state.pointer) {
    // Only redraw if hover actually changed (fixes heavy-outside-map issue)
    if (hoverChanged) scheduleDraw();
    return;
  }

  if (state.pointer.mode === "pan") {
    state.panX = state.pointer.startPanX + event.clientX - state.pointer.startClientX;
    state.panY = state.pointer.startPanY + event.clientY - state.pointer.startClientY;
    scheduleDraw(); return;
  }

  if (!cell) { scheduleDraw(); return; }

  const currentTool = state.pointer.tool;

  if (currentTool === "select") {
    if (state.pointer.activeSelection) { 
      state.pointer.activeSelection.x2 = cell.x; 
      state.pointer.activeSelection.y2 = cell.y; 
    }
    scheduleDraw(); return;
  }

  if (currentTool==="paint"||currentTool==="erase") {
    const key = `${cell.x},${cell.y}`;
    if (key !== state.pointer.lastKey) {
      state.pointer.lastKey = key;
      state.pointer.changed = paintCells([cell], currentTool==="erase" ? -2 : state.selectedTile) || state.pointer.changed;
    }
  } else if (currentTool==="replace") {
    state.pointer.changed = replaceTileAt(cell) || state.pointer.changed;
  } else {
    updatePreview(cell);
  }
}

function endPointer(event) {
  if (!state.pointer) return;
  const cell = eventToGrid(event);
  const currentTool = state.pointer.tool;
  if (state.pointer.mode === "edit" && cell) {
    if (currentTool==="rect") state.pointer.changed = paintCells(cellsInRect(state.pointer.startCell,cell), state.selectedTile) || state.pointer.changed;
    if (currentTool==="line") state.pointer.changed = paintCells(cellsInLine(state.pointer.startCell,cell), state.selectedTile) || state.pointer.changed;
    if (currentTool==="select" && state.pointer.activeSelection) {
      state.pointer.activeSelection.x2 = cell.x;
      state.pointer.activeSelection.y2 = cell.y;
      updateStatus();
    }
  }
  if (!state.pointer.changed && state.history.length && currentTool!=="select") state.history.pop();
  state.pointer = null; state.preview = null; state.lastReplacementSource = null;
  els.canvas.classList.remove("panning");
  try { els.canvas.releasePointerCapture(event.pointerId); } catch {}
  if (currentTool !== "select") applyRulesAndRender();
  else scheduleDraw();
}

function updatePreview(cell) {
  const currentTool = state.pointer?.tool || state.tool;
  if (!state.pointer?.startCell || !cell) { state.preview = null; }
  else if (currentTool==="rect") { state.preview = { cells: cellsInRect(state.pointer.startCell,cell) }; }
  else if (currentTool==="line") { state.preview = { cells: cellsInLine(state.pointer.startCell,cell) }; }
  else { state.preview = null; }
  scheduleDraw();
}

// ─── Undo / Redo ───────────────────────────────────────────────────────────

function undo() { if (!state.history.length) return; state.future.push(snapshot()); restore(state.history.pop()); }
function redo() { if (!state.future.length)  return; state.history.push(snapshot()); restore(state.future.pop()); }

// ─── Door UI ───────────────────────────────────────────────────────────────

function renderDoors() {
  els.doorList.innerHTML = "";
  if (!state.doors.length) {
    const e = document.createElement("div"); e.className="hint"; e.textContent="ドアなどに使うポイントがない"; els.doorList.appendChild(e); return;
  }
  state.doors.forEach((door,i) => {
    const row=document.createElement("div"); row.className="door-row";
    const pos=document.createElement("div"); pos.className="door-pos"; pos.textContent=`${door.position.x},${door.position.y}`;
    const tag=document.createElement("input"); tag.value=door.tag;
    tag.addEventListener("input",()=>{ door.tag=tag.value; saveLocal(); });
    const rm=document.createElement("button"); rm.className="tiny danger"; rm.textContent="X";
    rm.addEventListener("click",()=>{ pushHistory(); state.doors.splice(i,1); applyRulesAndRender(); });
    row.append(pos,tag,rm); els.doorList.appendChild(row);
  });
}

// ─── Rules UI ──────────────────────────────────────────────────────────────

function buildTileSelect(value, includeAny=false) {
  const select = document.createElement("select");
  if (includeAny) { const o=document.createElement("option"); o.value="-3"; o.textContent="Any"; select.appendChild(o); }
  for (const t of tileOptions) {
    const o=document.createElement("option"); o.value=String(t.id); o.textContent=t.id===-2?"-2 None":`${t.id} ${t.name}`; select.appendChild(o);
  }
  select.value=String(value); return select;
}

function renderRules() {
  els.ruleList.innerHTML = "";
  if (!state.rules.length) {
    const e=document.createElement("div"); e.className="hint"; e.textContent="ルールはありません。"; els.ruleList.appendChild(e); return;
  }
  state.rules.forEach((rawRule,index) => {
    const rule = normalizeRule(rawRule); state.rules[index]=rule;
    const card=document.createElement("div"); card.className="rule-card";
    const head=document.createElement("div"); head.className="rule-head";
    const name=document.createElement("input"); name.className="rule-name"; name.value=rule.name;
    name.addEventListener("input",()=>{ rule.name=name.value; saveLocal(); });
    const en=document.createElement("button"); en.className=`tiny${rule.enabled?" active":""}`; en.textContent=rule.enabled?"On":"Off";
    en.addEventListener("click",()=>{ rule.enabled=!rule.enabled; applyRulesAndRender(); });
    const rm=document.createElement("button"); rm.className="tiny danger"; rm.textContent="X";
    rm.addEventListener("click",()=>{ state.rules.splice(index,1); applyRulesAndRender(); });
    head.append(name,en,rm);
    const matrix=document.createElement("div"); matrix.className="rule-matrix";
    ruleCells.forEach((label,ci)=>{
      const cell=document.createElement("label"); cell.className="rule-cell";
      const cap=document.createElement("span"); cap.textContent=label;
      const sel=buildTileSelect(rule.match[ci],true);
      sel.addEventListener("change",()=>{ rule.match[ci]=parseInt(sel.value,10); applyRulesAndRender(); });
      cell.append(cap,sel); matrix.appendChild(cell);
    });
    const output=document.createElement("label"); output.textContent="Output";
    const os=buildTileSelect(rule.output,false);
    os.addEventListener("change",()=>{ rule.output=parseInt(os.value,10); applyRulesAndRender(); });
    output.appendChild(os);
    card.append(head,matrix,output); els.ruleList.appendChild(card);
  });
}

function addRule() {
  state.rules.push(normalizeRule({ name:`Rule ${state.rules.length+1}`, match:[-3,-3,-3,-3,0,-3,-3,-3,-3], output:0, enabled:true }));
  applyRulesAndRender();
}

// ─── Export / Import ───────────────────────────────────────────────────────

function rulesPayload() { return { schema:"ultimate-map-forge-rules/v1", rules: state.rules.map(r=>normalizeRule(r)) }; }

function downloadRulesJson() {
  const payload=rulesPayload();
  const url=URL.createObjectURL(new Blob([JSON.stringify(payload,null,2)],{type:"application/json"}));
  const a=document.createElement("a"); a.href=url; a.download=`map-rules-${els.type.value.trim()||"N"}.json`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  els.status.textContent=`Exported ${payload.rules.length} rules.`;
}

function importRulesPayload(payload) {
  const src = Array.isArray(payload) ? payload : payload?.rules;
  if (!Array.isArray(src)) throw new Error("Rules JSON must be an array or include a rules array.");
  state.rules = src.map(r=>normalizeRule(r)); applyRulesAndRender();
  els.status.textContent=`Imported ${state.rules.length} rules.`;
}

function importRulesFile(file) {
  if (!file) return;
  const reader=new FileReader();
  reader.onload=()=>{ try { importRulesPayload(JSON.parse(String(reader.result||"{}"))); } catch(e){ alert(`Rule import failed: ${e.message}`); } finally{ els.importRulesInput.value=""; } };
  reader.onerror=()=>{ els.status.textContent="Rule import failed."; els.importRulesInput.value=""; };
  reader.readAsText(file);
}

function findContentBounds(map, doors) {
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for (let y=0;y<map.length;y++) for(let x=0;x<map[y].length;x++) if(map[y][x]!==-2){ minX=Math.min(minX,x);minY=Math.min(minY,y);maxX=Math.max(maxX,x);maxY=Math.max(maxY,y); }
  for(const d of doors){ minX=Math.min(minX,d.position.x);minY=Math.min(minY,d.position.y);maxX=Math.max(maxX,d.position.x);maxY=Math.max(maxY,d.position.y); }
  if(!Number.isFinite(minX)){minX=0;minY=0;maxX=0;maxY=0;}
  return { minX:minX-1,minY:minY-1,maxX:maxX+1,maxY:maxY+1 };
}

function compressForExport() {
  if (!state.finalMap.length) return { map:[],doors:[],size:{x:0,y:0} };
  const b=findContentBounds(state.finalMap,state.doors);
  const map=[];
  for(let y=b.minY;y<=b.maxY;y++){ const row=[]; for(let x=b.minX;x<=b.maxX;x++) row.push(tileAt(state.finalMap,x,y)??-2); map.push(row); }
  const doors=state.doors.filter(d=>d.position.x>=b.minX&&d.position.x<=b.maxX&&d.position.y>=b.minY&&d.position.y<=b.maxY).map(d=>({position:{x:d.position.x-b.minX,y:d.position.y-b.minY},tag:d.tag}));
  return { map, doors, size:{x:b.maxX-b.minX+1,y:b.maxY-b.minY+1} };
}

function exportPayload() {
  const c=compressForExport();
  return { id:els.id.value.trim()||"1", type:els.type.value.trim()||"N", size:c.size, map:c.map, doors:c.doors };
}

function downloadJson() {
  const payload=exportPayload();
  const url=URL.createObjectURL(new Blob([JSON.stringify(payload,null,2)],{type:"application/json"}));
  const a=document.createElement("a"); a.href=url; a.download=`map-${payload.id}-${payload.type}.json`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}

async function copyJson() {
  await navigator.clipboard.writeText(JSON.stringify(exportPayload(),null,2));
  els.status.textContent="Export JSON copied.";
}

function normalizeImportedMap(map) {
  if(!Array.isArray(map)||!map.length||!Array.isArray(map[0])||!map[0].length) throw new Error("Import JSON must include a non-empty 2D map array.");
  const width=map[0].length;
  return map.map((row,y)=>{
    if(!Array.isArray(row)||row.length!==width) throw new Error(`Map row ${y} must have exactly ${width} columns.`);
    return row.map((v,x)=>{ const id=parseInt(v,10); if(!Number.isInteger(id)||id<-2||id>9||id===-1) throw new Error(`Invalid tile id at ${x},${y}.`); return id; });
  });
}

function normalizeImportedDoors(doors, width, height) {
  if(doors===undefined) return [];
  if(!Array.isArray(doors)) throw new Error("doors must be an array.");
  return doors.map((d,i)=>{
    const x=parseInt(d?.position?.x,10),y=parseInt(d?.position?.y,10);
    if(!Number.isInteger(x)||!Number.isInteger(y)||x<0||y<0||x>=width||y>=height) throw new Error(`Door ${i} has an invalid position.`);
    return { position:{x,y}, tag:String(d?.tag??"door") };
  });
}

function importPayload(payload) {
  const importedMap=normalizeImportedMap(payload?.map);
  const h=importedMap.length,w=importedMap[0].length;
  const importedDoors=normalizeImportedDoors(payload?.doors,w,h);
  pushHistory(); state.sourceMap=importedMap; state.doors=importedDoors;
  els.size.value=Math.max(w,h); els.cut.value=Math.max(w,h);
  if(payload?.id!==undefined) els.id.value=String(payload.id||"1");
  if(payload?.type!==undefined) els.type.value=String(payload.type||"N");
  state.selections=null;
  applyRulesAndRender(); fitView();
  els.status.textContent=`Imported ${w}x${h} map with ${state.doors.length} doors.`;
}

function importJsonFile(file) {
  if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{ try{ importPayload(JSON.parse(String(reader.result||"{}"))); } catch(e){ alert(`Import failed: ${e.message}`); } finally{ els.importInput.value=""; } };
  reader.onerror=()=>{ els.status.textContent="Import failed."; els.importInput.value=""; };
  reader.readAsText(file);
}

// ─── Readout modal ─────────────────────────────────────────────────────────

function renderReadout() {
  if(!state.finalMap.length) return;
  els.readoutGrid.style.setProperty("--cols",state.finalMap[0].length);
  els.readoutGrid.innerHTML="";
  for(const row of state.finalMap) for(const id of row){
    const cell=document.createElement("span"); cell.className=`readout-cell${id===-2?" none":""}`; cell.textContent=id===-2?".":id; cell.title=tileLabel(id); els.readoutGrid.appendChild(cell);
  }
}

function closeReadout() { els.readoutModal.classList.remove("open"); els.readoutModal.setAttribute("aria-hidden","true"); }

// ─── Event binding ─────────────────────────────────────────────────────────

function bindEvents() {
  els.generate.addEventListener("click", generate);
  els.fit.addEventListener("click", fitView);
  els.zoomIn.addEventListener("click",  () => zoomAt(1.18));
  els.zoomOut.addEventListener("click", () => zoomAt(0.84));
  els.import.addEventListener("click",  () => els.importInput.click());
  els.importInput.addEventListener("change", () => importJsonFile(els.importInput.files[0]));
  els.export.addEventListener("click",  downloadJson);
  els.exportCopy.addEventListener("click", () => copyJson().catch(() => { els.status.textContent="Clipboard permission failed."; }));
  els.undo.addEventListener("click", undo);
  els.redo.addEventListener("click", redo);
  els.copyBtn.addEventListener("click",  copySelection);
  els.pasteBtn.addEventListener("click", enterPasteMode);
  els.clearDoors.addEventListener("click", () => { pushHistory(); state.doors=[]; applyRulesAndRender(); });
  els.addRule.addEventListener("click", addRule);
  els.exportRules.addEventListener("click", downloadRulesJson);
  els.importRules.addEventListener("click", () => els.importRulesInput.click());
  els.importRulesInput.addEventListener("change", () => importRulesFile(els.importRulesInput.files[0]));
  els.toolGrid.addEventListener("click", e => { const b=e.target.closest("button[data-tool]"); if(b) selectTool(b.dataset.tool); });
  els.canvas.addEventListener("pointerdown",  startPointer);
  els.canvas.addEventListener("pointermove",  movePointer);
  els.canvas.addEventListener("pointerup",    endPointer);
  els.canvas.addEventListener("pointercancel",endPointer);
  els.canvas.addEventListener("pointerleave", () => {
    // Only redraw if hover was set (avoid spurious redraws)
    if (state.hover !== null) {
      state.hover = null; state.lastHoverKey = ""; els.hoverChip.textContent="タイルなし"; scheduleDraw();
    }
  });
  els.canvas.addEventListener("wheel", e => {
    e.preventDefault();
    const rect=els.canvas.getBoundingClientRect();
    zoomAt(e.deltaY<0?1.08:0.92, e.clientX-rect.left, e.clientY-rect.top);
  }, { passive:false });

  window.addEventListener("keydown", e => {
    if (!isTypingTarget(e.target) && !e.metaKey && !e.ctrlKey && !e.altKey) {
      if (/^[0-9]$/.test(e.key)) { selectTile(parseInt(e.key,10)); e.preventDefault(); return; }
      if (e.key==="Delete"||e.key==="Backspace") { selectTile(-2); e.preventDefault(); return; }
    }
    if (e.code==="Space") { state.spaceDown=true; e.preventDefault(); }
    if ((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==="z") { e.preventDefault(); e.shiftKey ? redo() : undo(); }
    if ((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==="y") { e.preventDefault(); redo(); }
    if ((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==="c" && !isTypingTarget(e.target)) { e.preventDefault(); copySelection(); }
    if ((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==="v" && !isTypingTarget(e.target)) { e.preventDefault(); enterPasteMode(); }
    if (e.key==="Escape") { 
      if(state.pasteMode) exitPasteMode(); 
      else if(state.selections) { state.selections=null; scheduleDraw(); updateStatus(); }
      closeReadout(); 
    }
  });
  window.addEventListener("keyup", e => { if(e.code==="Space") state.spaceDown=false; });

  for(const inp of [els.size,els.cut,els.id,els.type,els.doorTag]) inp.addEventListener("input",saveLocal);

  els.readout.addEventListener("click",()=>{ els.readoutModal.classList.add("open"); els.readoutModal.setAttribute("aria-hidden","false"); });
  els.closeReadout.addEventListener("click", closeReadout);
  els.readoutModal.addEventListener("click", e => { if(e.target===els.readoutModal) closeReadout(); });

  const ro=new ResizeObserver(()=>resizeCanvas()); ro.observe(els.stage);
  window.addEventListener("resize",()=>resizeCanvas());
}

// ─── Boot ──────────────────────────────────────────────────────────────────

async function boot() {
  loadLocal(); bindEvents(); renderPalette(); selectTool(state.tool);
  await preloadImages(); resizeCanvas(false);
  if(!state.sourceMap.length) state.sourceMap=makeDefaultMap();
  applyRulesAndRender(); fitView();
}

boot();
</script>
